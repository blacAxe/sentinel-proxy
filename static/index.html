<!DOCTYPE html>
<html>
<head>
    <title>Sentinel Monitor</title>
    <style>
        body { font-family: monospace; background: #121212; color: #00ff00; padding: 20px; }
        #log-window { background: #000; border: 1px solid #333; height: 300px; overflow-y: scroll; padding: 10px; margin-top: 10px; }
        .alert { color: #ff4444; font-weight: bold; }
        input { background: #222; color: #fff; border: 1px solid #555; padding: 10px; width: 300px; }
        button { padding: 10px; background: #00ff00; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Sentinel Security Gateway</h1>
    <input type="text" id="siteUrl" placeholder="Enter Site URL (e.g. https://...)">
    <button onclick="updateTarget()">Protect Site</button>

    <div id="log-window"></div>

    <script>
        // Listen for real-time logs from Go
        const eventSource = new EventSource("/logs");
        eventSource.onmessage = (event) => {
            const logBox = document.getElementById('log-window');
            const newLog = document.createElement('div');
            if (event.data.includes("BLOCK")) newLog.className = "alert";
            newLog.innerText = `> ${event.data}`;
            logBox.appendChild(newLog);
            logBox.scrollTop = logBox.scrollHeight;
        };

        function updateTarget() {
            const url = document.getElementById('siteUrl').value;
            fetch(`/update-target?url=${encodeURIComponent(url)}`);
            document.getElementById('log-window').innerHTML += `<div>[SYSTEM] Switched target to ${url}</div>`;
        }
    </script>
</body>
</html>
